<div style="text-align: center; margin-bottom: 25px;">
    <div style="font-size: 3rem; margin-bottom: 10px;">💳</div>
    <h3 style="margin-bottom: 5px;">Redeem Reward</h3>
    <p style="color: var(--text-muted); font-size: 0.9rem;">Fill in your details below to process your withdrawal.</p>
</div>

<div style="background: var(--surface-color); padding: 20px; border-radius: 16px;">
    
    <div style="background: rgba(255,204,0,0.1); border: 1px solid rgba(255,204,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between;">
        <span style="color: var(--text-muted); font-size: 0.9rem;">Cost:</span>
        <span style="color: #ffcc00; font-weight: bold;">50,000 🪙</span>
    </div>

    <div style="margin-bottom: 15px;">
        <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px;">Select Network / Method</label>
        <select style="width: 100%; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px; border-radius: 8px; outline: none; appearance: none;">
            <option>bKash (Personal)</option>
            <option>Nagad (Personal)</option>
            <option>Rocket</option>
        </select>
    </div>
    
    <div style="margin-bottom: 25px;">
        <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px;">Account Number</label>
        <input type="number" placeholder="e.g. 01XXXXXXXXX" style="width: 100%; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 14px; border-radius: 8px; outline: none;">
    </div>

    <button onclick="alert('Withdrawal request sent to admin for approval!'); closeSubPage();" style="width: 100%; background: var(--accent-color); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 1.05rem; cursor: pointer;">Confirm Withdrawal</button>
</div>
