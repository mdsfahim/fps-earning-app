<h2 class="page-title">Game Arcade</h2>
<div id="game-arcade-grid" class="arcade-grid">
    </div>

<div id="game-details-modal" class="game-modal-overlay" style="display: none;">
    <div class="game-modal-content">
        <button class="modal-close-btn" onclick="closeGameDetails()">✕</button>
        <div id="modal-game-icon" class="modal-game-icon">🎮</div>
        <h2 id="modal-game-title" style="margin-bottom: 10px;">Game Title</h2>
        <p id="modal-game-desc" style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px; line-height: 1.4;">Game description goes here.</p>
        
        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
            <span style="color: var(--text-muted); font-size: 0.85rem;">Reward per win:</span>
            <h3 id="modal-game-reward" style="color: #ffcc00; margin-top: 5px;">+ 100 🪙</h3>
        </div>

        <button id="modal-play-btn" class="play-btn-large">Play Now</button>
    </div>
</div>
