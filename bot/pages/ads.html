<h2 class="page-title">Advertise</h2>

<div style="background: linear-gradient(135deg, rgba(255,149,0,0.15) 0%, rgba(255,149,0,0.02) 100%); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid rgba(255,149,0,0.2); display: flex; flex-direction: column; gap: 15px;">
    <div>
        <h3 style="color: #ff9500; margin-bottom: 8px;">Promote Your Link 🚀</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.4;">Spend your earned coins to get real users to join your Telegram channel, group, or visit your website.</p>
    </div>
    
    <button onclick="openSubPage('payment', 'deposit', 'Add Funds')" style="background: rgba(255, 149, 0, 0.2); color: #ff9500; border: 1px solid rgba(255, 149, 0, 0.4); padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <ion-icon name="wallet-outline" style="font-size: 1.2rem;"></ion-icon> Deposit Crypto
    </button>
</div>

<div style="background: var(--surface-color); padding: 20px; border-radius: 16px; margin-bottom: 25px;">
    <h4 style="margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px;">Create Campaign</h4>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Ad Title</label>
        <input type="text" placeholder="e.g. Join my awesome channel!" style="width: 100%; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; outline: none; transition: 0.2s;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Target URL</label>
        <input type="url" placeholder="https://t.me/yourlink" style="width: 100%; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; outline: none; transition: 0.2s;">
    </div>

    <div style="display: flex; gap: 15px; margin-bottom: 20px;">
        <div style="flex: 1;">
            <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Cost Per Click</label>
            <input type="text" value="50 🪙" disabled style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05); color: var(--text-muted); padding: 12px; border-radius: 8px; outline: none; text-align: center;">
        </div>
        <div style="flex: 1;">
            <label style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px;">Desired Clicks</label>
            <input type="number" placeholder="e.g. 100" style="width: 100%; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; outline: none; text-align: center;">
        </div>
    </div>
    
    <button onclick="alert('In a real app, this would deduct coins and send the ad to your Admin Panel for approval.')" style="width: 100%; background: #ff9500; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s;">Submit Campaign</button>
</div>

<h3 style="font-size: 1.1rem; margin-bottom: 15px; color: var(--text-muted); padding-left: 5px;">My Campaigns</h3>

<div style="text-align: center; color: var(--text-muted); padding: 30px 20px; background: var(--surface-color); border-radius: 16px;">
    <div style="font-size: 2.5rem; margin-bottom: 10px;">📊</div>
    <p>You haven't created any ads yet.</p>
</div>
